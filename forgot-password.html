<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên Mật Khẩu - IoT Platform</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">🔐</div>
            <h1>Quên Mật Khẩu</h1>
            <p class="subtitle">Nhập email để lấy lại mật khẩu</p>
            
            <div id="error-message" class="error-message"></div>
            <div id="success-message" class="success-message"></div>
            
            <!-- Bước 1: Nhập Email -->
            <div id="step1">
                <form onsubmit="requestResetCode(event)">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" placeholder="Nhập email của bạn" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Gửi Mã Reset</button>
                </form>
            </div>
            
            <!-- Bước 2: Nhập Mã và Mật khẩu mới -->
            <div id="step2" style="display: none;">
                <form onsubmit="resetPassword(event)">
                    <div class="form-group">
                        <label for="code">Mã Reset (6 số)</label>
                        <input type="text" id="code" placeholder="Nhập mã 6 số" maxlength="6" required>
                    </div>
                    <div class="form-group">
                        <label for="newPassword">Mật khẩu mới</label>
                        <input type="password" id="newPassword" placeholder="Nhập mật khẩu mới" required>
                    </div>
                    <div class="form-group">
                        <label for="confirmPassword">Xác nhận mật khẩu</label>
                        <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Đổi Mật Khẩu</button>
                </form>
            </div>
            
            <p class="auth-link">
                <a href="login.html">← Quay lại đăng nhập</a>
            </p>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script>
        let userEmail = '';
        
        async function requestResetCode(event) {
            event.preventDefault();
            hideMessages();
            
            userEmail = document.getElementById('email').value;
            
            try {
                const response = await fetch(`${API_URL}/api/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: userEmail })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Hiển thị mã (chỉ để test, production sẽ gửi email)
                    showSuccess(`Mã reset: ${data.code} (Mã này chỉ hiển thị để test)`);
                    
                    // Chuyển sang bước 2
                    document.getElementById('step1').style.display = 'none';
                    document.getElementById('step2').style.display = 'block';
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Không thể kết nối đến server!');
            }
        }
        
        async function resetPassword(event) {
            event.preventDefault();
            hideMessages();
            
            const code = document.getElementById('code').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (newPassword !== confirmPassword) {
                showError('Mật khẩu xác nhận không khớp!');
                return;
            }
            
            if (newPassword.length < 6) {
                showError('Mật khẩu phải ít nhất 6 ký tự!');
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: userEmail,
                        code: code,
                        new_password: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('Đổi mật khẩu thành công! Đang chuyển đến trang đăng nhập...');
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Không thể kết nối đến server!');
            }
        }
        
        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.style.display = 'block';
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('success-message');
            el.textContent = msg;
            el.style.display = 'block';
        }
        
        function hideMessages() {
            document.getElementById('error-message').style.display = 'none';
            document.getElementById('success-message').style.display = 'none';
        }
    </script>
</body>
</html>
