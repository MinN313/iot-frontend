<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Quản lý Users</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
        }
        .user-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
        }
        .user-table th, .user-table td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .user-table th {
            background: rgba(79, 172, 254, 0.2);
            color: #4facfe;
        }
        .user-table tr:hover {
            background: rgba(255,255,255,0.05);
        }
        .role-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
        }
        .role-admin { background: rgba(255,71,87,0.2); color: #ff4757; }
        .role-operator { background: rgba(255,165,2,0.2); color: #ffa502; }
        .role-user { background: rgba(46,213,115,0.2); color: #2ed573; }
        .action-btn {
            padding: 8px 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            margin-right: 5px;
            font-size: 12px;
        }
        .btn-edit { background: #4facfe; color: white; }
        .btn-reset { background: #ffa502; color: white; }
        .btn-delete { background: #ff4757; color: white; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: #1a1a2e;
            padding: 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
        }
        .modal-content h2 { margin-bottom: 20px; }
        .close-btn {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #aaa;
        }
        .back-link {
            display: inline-block;
            padding: 10px 20px;
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            text-decoration: none;
            border-radius: 8px;
        }
        .back-link:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <div>
                <h1>👑 Quản lý Users</h1>
                <p style="color: #aaa;">Chỉ Admin mới có quyền truy cập</p>
            </div>
            <div>
                <a href="dashboard.html" class="back-link">← Dashboard</a>
                <button onclick="logout()" class="btn-logout" style="margin-left: 10px;">Đăng xuất</button>
            </div>
        </div>
        
        <div id="error-message" class="error-message"></div>
        <div id="success-message" class="success-message"></div>
        
        <table class="user-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Họ tên</th>
                    <th>Email</th>
                    <th>Role</th>
                    <th>Ngày tạo</th>
                    <th>Hành động</th>
                </tr>
            </thead>
            <tbody id="users-list">
                <tr>
                    <td colspan="6" style="text-align: center;">Đang tải...</td>
                </tr>
            </tbody>
        </table>
    </div>
    
    <!-- Modal đổi Role -->
    <div id="roleModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('roleModal')">&times;</span>
            <h2>Đổi Role</h2>
            <input type="hidden" id="editUserId">
            <div class="form-group">
                <label>Chọn Role mới:</label>
                <select id="newRole" style="width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);">
                    <option value="user">User</option>
                    <option value="operator">Operator</option>
                    <option value="admin">Admin</option>
                </select>
            </div>
            <button onclick="saveRole()" class="btn btn-primary" style="width: 100%; margin-top: 15px;">
                Lưu thay đổi
            </button>
        </div>
    </div>
    
    <!-- Modal Reset Password -->
    <div id="resetModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal('resetModal')">&times;</span>
            <h2>Reset Mật Khẩu</h2>
            <input type="hidden" id="resetUserId">
            <p id="resetUserEmail" style="color: #aaa; margin-bottom: 15px;"></p>
            <div class="form-group">
                <label>Mật khẩu mới:</label>
                <input type="text" id="newPassword" value="123456" style="width: 100%; padding: 10px; border-radius: 8px; margin-top: 10px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2);">
            </div>
            <button onclick="saveResetPassword()" class="btn btn-primary" style="width: 100%; margin-top: 15px;">
                Reset Mật Khẩu
            </button>
        </div>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Kiểm tra quyền admin
        document.addEventListener('DOMContentLoaded', function() {
            const user = getUser();
            if (!user || user.role !== 'admin') {
                alert('Bạn không có quyền truy cập trang này!');
                window.location.href = 'dashboard.html';
                return;
            }
            loadUsers();
        });
        
        async function loadUsers() {
            try {
                const response = await fetch(`${API_URL}/api/admin/users`, {
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    displayUsers(data.data);
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Không thể tải danh sách users!');
            }
        }
        
        function displayUsers(users) {
            const tbody = document.getElementById('users-list');
            
            if (users.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align: center;">Chưa có user nào</td></tr>';
                return;
            }
            
            tbody.innerHTML = users.map(user => `
                <tr>
                    <td>${user.id}</td>
                    <td>${user.name || 'Chưa đặt tên'}</td>
                    <td>${user.email}</td>
                    <td>
                        <span class="role-badge role-${user.role}">${user.role.toUpperCase()}</span>
                    </td>
                    <td>${new Date(user.created_at).toLocaleDateString('vi-VN')}</td>
                    <td>
                        <button class="action-btn btn-edit" onclick="openRoleModal(${user.id}, '${user.role}')">
                            Đổi Role
                        </button>
                        <button class="action-btn btn-reset" onclick="openResetModal(${user.id}, '${user.email}')">
                            Reset MK
                        </button>
                        <button class="action-btn btn-delete" onclick="deleteUser(${user.id}, '${user.email}')">
                            Xóa
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function openRoleModal(userId, currentRole) {
            document.getElementById('editUserId').value = userId;
            document.getElementById('newRole').value = currentRole;
            document.getElementById('roleModal').classList.add('active');
        }
        
        function openResetModal(userId, email) {
            document.getElementById('resetUserId').value = userId;
            document.getElementById('resetUserEmail').textContent = `Email: ${email}`;
            document.getElementById('newPassword').value = '123456';
            document.getElementById('resetModal').classList.add('active');
        }
        
        function closeModal(modalId) {
            document.getElementById(modalId).classList.remove('active');
        }
        
        async function saveRole() {
            const userId = document.getElementById('editUserId').value;
            const newRole = document.getElementById('newRole').value;
            
            try {
                const response = await fetch(`${API_URL}/api/admin/users/${userId}/role`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ role: newRole })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('Đã đổi role thành công!');
                    closeModal('roleModal');
                    loadUsers();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Lỗi kết nối server!');
            }
        }
        
        async function saveResetPassword() {
            const userId = document.getElementById('resetUserId').value;
            const newPassword = document.getElementById('newPassword').value;
            
            try {
                const response = await fetch(`${API_URL}/api/admin/users/${userId}/reset-password`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({ new_password: newPassword })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess(`Đã reset mật khẩu thành: ${newPassword}`);
                    closeModal('resetModal');
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Lỗi kết nối server!');
            }
        }
        
        async function deleteUser(userId, email) {
            if (!confirm(`Bạn có chắc muốn xóa user ${email}?`)) {
                return;
            }
            
            try {
                const response = await fetch(`${API_URL}/api/admin/users/${userId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${getToken()}` }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showSuccess('Đã xóa user!');
                    loadUsers();
                } else {
                    showError(data.error);
                }
            } catch (error) {
                showError('Lỗi kết nối server!');
            }
        }
        
        function showError(msg) {
            const el = document.getElementById('error-message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
        
        function showSuccess(msg) {
            const el = document.getElementById('success-message');
            el.textContent = msg;
            el.style.display = 'block';
            setTimeout(() => el.style.display = 'none', 3000);
        }
    </script>
</body>
</html>
